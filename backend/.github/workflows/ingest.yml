name: Daily data refresh

on:
  schedule:
    # 18:00 UTC = 11:30 PM IST, after NSE market close (15:30 IST)
    - cron: "0 18 * * 1-5"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch prices
        run: python -m ingest.fetch_prices

      - name: Compute technical snapshot
        run: python -m ingest.compute_technicals

      - name: Compute scores
        run: python -m ingest.compute_scores
